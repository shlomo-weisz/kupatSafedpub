<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <script src="<%= BASE_URL %>runtime-config.js"></script>
    <script>
      window.__APP_CONFIG__ = Object.assign({}, window.__APP_CONFIG__ || {}, {
        VUE_APP_API_URL:
          (window.__APP_CONFIG__ && window.__APP_CONFIG__.VUE_APP_API_URL) ||
          <%= typeof VUE_APP_API_URL !== 'undefined'
            ? JSON.stringify(VUE_APP_API_URL)
            : typeof VUE_APP_API_BASE_URL !== 'undefined'
              ? JSON.stringify(VUE_APP_API_BASE_URL)
              : '""' %>,
        VUE_APP_API_BASE_URL:
          (window.__APP_CONFIG__ && window.__APP_CONFIG__.VUE_APP_API_BASE_URL) ||
          <%= typeof VUE_APP_API_URL !== 'undefined'
            ? JSON.stringify(VUE_APP_API_URL)
            : typeof VUE_APP_API_BASE_URL !== 'undefined'
              ? JSON.stringify(VUE_APP_API_BASE_URL)
              : '""' %>,
        VUE_APP_OCR_API_URL:
          (window.__APP_CONFIG__ && window.__APP_CONFIG__.VUE_APP_OCR_API_URL) ||
          <%= typeof VUE_APP_OCR_API_URL !== 'undefined'
            ? JSON.stringify(VUE_APP_OCR_API_URL)
            : '""' %>,
      });
    </script>
    <!-- built files will be auto injected -->
  </body>
</html>
